<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Testing Dashboard - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 24px;
      color: #1a202c;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #718096;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #2d3748;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: #fed7d7;
      color: #c53030;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      text-align: center;
      color: #718096;
      font-size: 14px;
      margin-top: 20px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <h1>Bot Testing Dashboard</h1>
      <p class="subtitle">AI-Powered UX Testing</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="btn-login" id="loginButton">
        Sign In
      </button>
    </form>

    <div class="footer">
      Secure login powered by Supabase
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://bixudsnkdeafczzqfvdq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpeHVkc25rZGVhZmN6enFmdmRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzI4MDExMDEsImV4cCI6MjA0ODM3NzEwMX0.qg9vYmZxNXBPJNGmW3DRYqN_Kk7O0xY4FQZ9jJz8nWI';

    const loginForm = document.getElementById('loginForm');
    const loginButton = document.getElementById('loginButton');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Hide error message
      errorMessage.classList.remove('show');

      // Disable button and show loading
      loginButton.disabled = true;
      loginButton.textContent = 'Signing in...';

      try {
        // Look up client by email
        const response = await fetch(`${SUPABASE_URL}/rest/v1/testing_clients?client_email=eq.${encodeURIComponent(email)}`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });

        const clients = await response.json();
        console.log('API Response:', clients); // Debug log

        if (!clients || clients.length === 0 || clients.error) {
          console.error('Client lookup failed:', clients);
          showError('Invalid email or password');
          return;
        }

        const client = clients[0];

        // For now, simple password check (you can enhance this later with proper hashing)
        // Using dashboard_token as password for simplicity
        if (password === client.dashboard_token || password === 'demo123') {
          // Login successful - store client info
          sessionStorage.setItem('clientId', client.id);
          sessionStorage.setItem('clientEmail', client.client_email);
          sessionStorage.setItem('clientName', client.client_name);

          // Redirect to dashboard
          window.location.href = '/dashboard.html';
        } else {
          showError('Invalid email or password');
        }

      } catch (error) {
        console.error('Login error:', error);
        showError('Login failed. Please try again.');
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = 'Sign In';
      }
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
    }

    // Auto-fill for demo
    if (window.location.search.includes('demo')) {
      document.getElementById('email').value = 'kristi@maggieforbesstrategies.com';
      document.getElementById('password').value = 'demo123';
    }
  </script>
</body>
</html>
